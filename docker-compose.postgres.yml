version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-valdoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-valdoc_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-valdoc}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-valdoc} -d ${POSTGRES_DB:-valdoc}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  pg-test:
    image: node:24-bookworm
    working_dir: /workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://valdoc:valdoc_dev_password@postgres:5432/valdoc?schema=public}
      JWT_SECRET: ${JWT_SECRET:-replace-with-32-plus-char-random-secret-value}
      CUSTOMER_ID: ${CUSTOMER_ID:-qa-org}
      ORG_NAME: ${ORG_NAME:-QA Organization}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-replace-with-32-plus-char-random-secret-value}
    command: >
      sh -c "npm ci &&
             npx prisma migrate deploy --schema prisma/schema.postgres.prisma &&
             npm run db:generate &&
             npm test"
    volumes:
      - ./:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - test

volumes:
  pg_data:
